<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none">
  <defs>
    <!-- Radial glow for planet -->
    <radialGradient id="planetGrad" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#FF6B35" />
      <stop offset="40%" stop-color="#C1440E" />
      <stop offset="100%" stop-color="#5A1A00" />
    </radialGradient>
    <!-- Orbit ring gradient -->
    <linearGradient id="orbitGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#FF6B35" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0.8" />
    </linearGradient>
    <!-- Inner glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Planet shadow -->
    <radialGradient id="shadowGrad" cx="70%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Outer orbit ring (ellipse, tilted) -->
  <ellipse cx="60" cy="60" rx="52" ry="18" stroke="url(#orbitGrad)" stroke-width="1.2" opacity="0.7" transform="rotate(-22 60 60)" />

  <!-- Second orbit ring (wider, fainter) -->
  <ellipse cx="60" cy="60" rx="44" ry="14" stroke="#FF6B35" stroke-width="0.5" opacity="0.2" transform="rotate(-22 60 60)" />

  <!-- Planet body -->
  <circle cx="60" cy="60" r="24" fill="url(#planetGrad)" filter="url(#glow)" />

  <!-- Shadow overlay on planet -->
  <circle cx="60" cy="60" r="24" fill="url(#shadowGrad)" />

  <!-- Surface detail lines (latitude arcs) -->
  <ellipse cx="60" cy="60" rx="24" ry="8" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="none" />
  <ellipse cx="60" cy="60" rx="24" ry="16" stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none" />

  <!-- Highlight flare -->
  <circle cx="50" cy="50" r="6" fill="rgba(255,200,150,0.18)" />

  <!-- Orbit dot (satellite) -->
  <circle cx="60" cy="42" r="2.5" fill="#FF6B35" opacity="0.9" filter="url(#glow)" transform="rotate(-22 60 60)" />
</svg>
